# Turbopack has broken native bindings on this Mac — pin to the webpack build
# (same setup as the billy-bread site, which deploys cleanly).
[build]
  command = "next build --webpack"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers, applied to every response. No Content-Security-Policy yet;
# that needs testing against the fonts and the booking embed before it can be
# turned on safely. No HSTS "preload" so this stays reversible.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-DNS-Prefetch-Control = "on"
